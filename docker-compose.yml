services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PAYROLL_ENV: development
      # Database is managed by pf-db. Start it with: cd ../pf-db && make db-up
      PF_DATABASE_URL: postgresql+asyncpg://pf_db:pf_db@host.docker.internal:5432/pf_db
      PAYROLL_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
