name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout pf-payroll en subdirectorio
      - name: Checkout pf-payroll
        uses: actions/checkout@v4
        with:
          path: pf-payroll

      # Checkout pf-common al lado de pf-payroll
      - name: Checkout pf-common
        uses: actions/checkout@v4
        with:
          repository: mrturo-pf/pf-common
          path: pf-common

      # Setup Python
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # Instalar dependencias del sistema (si es necesario)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      # Verificar estructura
      - name: Verify directory structure
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Directory structure:"
          ls -la
          echo ""
          echo "pf-payroll Makefile includes:"
          grep "include.*pf-common" pf-payroll/Makefile || echo "No pf-common include found"

      # Instalar dependencias de pf-payroll
      - name: Install dependencies
        working-directory: pf-payroll
        run: make install

      # Instalar Trivy para security scanning
      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # Ejecutar quality checks completo
      - name: Run quality checks
        working-directory: pf-payroll
        run: make check

      # (Opcional) Upload coverage
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: pf-payroll/htmlcov/
