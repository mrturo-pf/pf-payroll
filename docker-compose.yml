services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PAYROLL_ENV: development
      PAYROLL_DATABASE_URL: postgresql+asyncpg://payroll:payroll@db:5432/payroll
      PAYROLL_LOG_LEVEL: INFO
    depends_on:
      - db
    ports:
      - "8000:8000"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: payroll
      POSTGRES_USER: payroll
      POSTGRES_PASSWORD: payroll
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
